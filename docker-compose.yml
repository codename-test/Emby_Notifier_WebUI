version: '3'
services:
  emby_notifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emby_notifier
    environment:
      - TZ=Asia/Shanghai
      # WebUI 端口，默认 5000，可通过此处修改
      - WEB_PORT=5000
      # 数据库存放路径
      - DB_PATH=/data/emby_notifier.db
      # 可选参数
      - TVDB_API_KEY=
      - TMDB_IMAGE_DOMAIN=https://image.tmdb.org
      - LOG_LEVEL=INFO
      - LOG_EXPORT=False
      - LOG_PATH=/var/tmp/emby_notifier/
    volumes:
      - emby_data:/data
    network_mode: "host"
    restart: unless-stopped

volumes:
  emby_data:
